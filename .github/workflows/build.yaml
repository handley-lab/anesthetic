name: Build and push to PyPI on merging to master
on:
  push:
    branches:
      - master
  workflow_dispatch:
jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.step1.outputs.v }}
    steps:
      - uses: actions/checkout@v5
      - name: Get version number
        id: step1
        run: echo "v=$(grep ':Version:' README.rst | awk '{print $2}')" >> $GITHUB_OUTPUT

  git-tag-and-release:
    runs-on: ubuntu-latest
    needs: get-version
    steps:
      - uses: actions/checkout@v5
      - name: set version number
        run: echo "DIST_VERSION=v${{ needs.get-version.outputs.version }}" >> $GITHUB_ENV
      - name: Create Tag
        uses: actions/github-script@v6
        with:
          script: |
            const {DIST_VERSION} = process.env
            try {
              await github.rest.git.createRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `refs/tags/${DIST_VERSION}`,
                  sha: context.sha
              })
              console.log(`Created tag ${DIST_VERSION}`)
            } catch (error) {
              if (error.status === 422) {
                console.log(`Tag ${DIST_VERSION} already exists, skipping tag creation`)
              } else {
                throw error
              }
            }
      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          name: "${{ env.DIST_VERSION }}"
          tag: "${{ env.DIST_VERSION }}"
          generateReleaseNotes: true
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          skipIfReleaseExists: true

  pypi-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pypa/build
        run: python -m pip install build --user
      - name: Build a binary wheel and a source tarball
        run: python -m build --sdist --wheel --outdir dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

  pypi-public:
    needs:
      - get-version
      - pypi-release
    runs-on: ubuntu-latest
    steps:
      - name: Wait for PyPi
        uses: nev7n/wait_for_response@v1
        with:
          url: "https://files.pythonhosted.org/packages/source/a/anesthetic/anesthetic-${{ needs.get-version.outputs.version }}.tar.gz"
          responseCode: 200
          timeout: 600000
          interval: 10000

  aur-release:
    needs: pypi-public
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install tomli
      - name: Generate PKGBUILD
        run: python ./bin/gen_PKGBUILD.py > ./PKGBUILD
      - name: Publish AUR package
        uses: KSXGitHub/github-actions-deploy-aur@v2.7.0
        with:
          pkgname: python-anesthetic
          pkgbuild: ./PKGBUILD
          updpkgsums: True
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}

  conda-release:
    needs:
      - pypi-public
      - get-version
    name: Build and deploy to conda
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Conda environment creation and activation
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: '3.11'
          auto-update-conda: false
          auto-activate-base: false
          show-channel-urls: true
          channels: conda-forge,handley-lab
      - name: install dependencies
        shell: bash -el {0}
        run: |
          # Pin major versions to avoid breakage from unrelated tool changes.
          # Bump when conda-build or anaconda-client introduce CLI changes we use.
          conda install -y "conda-build>=24,<26" "anaconda-client>=1.12,<2"
          pip install grayskull
      - name: Generate meta.yaml from grayskull
        shell: bash -el {0}
        run: grayskull pypi --strict-conda-forge anesthetic==${{ needs.get-version.outputs.version }}
      - name: Build and upload the conda packages
        shell: bash -el {0}
        env:
          ANACONDA_TOKEN: ${{ secrets.ANACONDA_TOKEN }}
        run: |
          set -e
          out_dir=$(mktemp -d -t conda-build-XXXXXXXXXX)
          echo "Building anesthetic conda package..."
          conda-build anesthetic/ \
            --no-anaconda-upload \
            --output-folder "$out_dir" \
            --python 3.11

          echo ""
          echo "Built artifacts:"
          find "$out_dir" -maxdepth 3 \( -name "*.tar.bz2" -o -name "*.conda" \)

          echo ""
          echo "Uploading to anaconda.org..."
          found=0
          while IFS= read -r pkg; do
            if [ -e "$pkg" ]; then
              echo "  Uploading $pkg"
              anaconda --token "$ANACONDA_TOKEN" upload \
                --user handley-lab --label main "$pkg"
              found=$((found + 1))
            fi
          done < <(find "$out_dir" -maxdepth 3 \( -name "*.tar.bz2" -o -name "*.conda" \))

          if [ "$found" -eq 0 ]; then
            echo "ERROR: no built packages found in $out_dir"
            exit 1
          fi
          echo "Uploaded $found package(s)."

  conda-build:
    needs:
      - conda-release
      - get-version
    name: test installation from conda
    runs-on: ubuntu-latest
    steps:
      - name: Conda environment creation and activation
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: '3.11'
          auto-update-conda: false
          auto-activate-base: false
          show-channel-urls: true
      - name: install from conda
        shell: bash -el {0}
        run: conda install -c handley-lab anesthetic
      - name: get install version
        shell: bash -el {0}
        run: echo "install_version=$(python -c 'import anesthetic; print(anesthetic.__version__)')" >> $GITHUB_ENV
      - name: Check version and warn if mismatch
        shell: bash -el {0}
        run: |
          if [ "${{ env.install_version }}" != "${{ needs.get-version.outputs.version }}" ]; then
            echo "::warning::Conda version (${{ env.install_version }}) does not match expected version (${{ needs.get-version.outputs.version }}). This may be due to conda channel propagation delay."
            echo "Expected: ${{ needs.get-version.outputs.version }}"
            echo "Got: ${{ env.install_version }}"
          else
            echo "Version check passed: ${{ env.install_version }}"
          fi

  pypi-build:
    needs:
      - pypi-public
      - get-version
    name: test installation from pypi
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install from pypi
        run: pip install anesthetic
      - name: get install version
        run: echo "install_version=$(python -c 'import anesthetic; print(anesthetic.__version__)')" >> $GITHUB_ENV
      - name: fail if versions not matching
        if: ${{ env.install_version != needs.get-version.outputs.version }}
        run: exit 1
